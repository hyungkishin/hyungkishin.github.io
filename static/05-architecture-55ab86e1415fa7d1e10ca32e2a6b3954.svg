<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arr5" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arr5p" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#533483"/>
    </marker>
  </defs>

  <rect width="780" height="520" rx="12" fill="#0d1117"/>

  <!-- commerce-api box -->
  <rect x="20" y="20" width="340" height="230" rx="10" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="40" y="44" fill="#58a6ff" font-size="13" font-weight="700">commerce-api</text>

  <rect x="40" y="60" width="140" height="40" rx="6" fill="#1a1a2e" filter="url(#shadow5)"/>
  <text x="110" y="84" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">POST /coupons/issue</text>

  <line x1="180" y1="80" x2="210" y2="80" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="215" y="55" width="130" height="50" rx="6" fill="#16213e" filter="url(#shadow5)"/>
  <text x="280" y="75" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">issue_request +</text>
  <text x="280" y="91" text-anchor="middle" fill="#8b949e" font-size="10">outbox INSERT (1 tx)</text>

  <line x1="280" y1="105" x2="280" y2="125" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="230" y="128" width="100" height="36" rx="6" fill="#2d6a4f"/>
  <text x="280" y="150" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">✅ 202 Accepted</text>

  <!-- Scheduler -->
  <rect x="40" y="180" width="130" height="50" rx="6" fill="#16213e" filter="url(#shadow5)"/>
  <text x="105" y="200" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">⏰ OutboxRelay</text>
  <text x="105" y="216" text-anchor="middle" fill="#8b949e" font-size="9">SKIP LOCKED 폴링</text>

  <line x1="170" y1="205" x2="210" y2="205" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="215" y="185" width="130" height="40" rx="6" fill="#0f3460" filter="url(#shadow5)"/>
  <text x="280" y="209" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">📤 Kafka send (Avro)</text>

  <!-- Kafka -->
  <rect x="400" y="140" width="160" height="100" rx="10" fill="none" stroke="#533483" stroke-width="1.5"/>
  <text x="420" y="164" fill="#a78bfa" font-size="13" font-weight="700">Kafka</text>

  <line x1="345" y1="205" x2="400" y2="195" stroke="#533483" stroke-width="2" marker-end="url(#arr5p)"/>

  <rect x="415" y="175" width="130" height="45" rx="6" fill="#533483" filter="url(#shadow5)"/>
  <text x="480" y="193" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">coupon-issue-requests</text>
  <text x="480" y="209" text-anchor="middle" fill="#8b949e" font-size="9">key = couponId</text>

  <!-- commerce-streamer box -->
  <rect x="400" y="270" width="360" height="200" rx="10" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="420" y="294" fill="#58a6ff" font-size="13" font-weight="700">commerce-streamer</text>

  <line x1="480" y1="220" x2="480" y2="305" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="420" y="308" width="150" height="40" rx="6" fill="#1a1a2e" filter="url(#shadow5)"/>
  <text x="495" y="332" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">CouponIssueConsumer</text>

  <line x1="495" y1="348" x2="495" y2="368" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="420" y="370" width="150" height="40" rx="6" fill="#16213e" filter="url(#shadow5)"/>
  <text x="495" y="394" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">tryMarkHandled (PK)</text>

  <!-- Branch: new -->
  <line x1="570" y1="390" x2="620" y2="390" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr5)"/>
  <text x="595" y="383" fill="#2d6a4f" font-size="9">신규</text>
  <rect x="625" y="370" width="120" height="40" rx="6" fill="#0f3460" filter="url(#shadow5)"/>
  <text x="685" y="389" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">수량 확인 + 차감</text>
  <text x="685" y="403" text-anchor="middle" fill="#8b949e" font-size="9">+ 발급 + ack</text>

  <!-- Branch: dup -->
  <line x1="570" y1="400" x2="620" y2="430" stroke="#4a4a4a" stroke-width="1.5" marker-end="url(#arr5)"/>
  <text x="598" y="422" fill="#6b7280" font-size="9">중복</text>
  <rect x="625" y="420" width="90" height="32" rx="6" fill="#4a4a4a"/>
  <text x="670" y="440" text-anchor="middle" fill="#e0e0e0" font-size="10">skip + ack</text>

  <!-- Polling box -->
  <rect x="20" y="350" width="340" height="100" rx="10" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="40" y="374" fill="#58a6ff" font-size="13" font-weight="700">사용자 결과 조회</text>

  <rect x="40" y="390" width="170" height="40" rx="6" fill="#1a1a2e" filter="url(#shadow5)"/>
  <text x="125" y="414" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">GET /issue/{requestId}</text>

  <line x1="210" y1="410" x2="240" y2="410" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="245" y="390" width="100" height="40" rx="6" fill="#16213e" filter="url(#shadow5)"/>
  <text x="295" y="414" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">status 확인</text>

  <!-- Legend -->
  <text x="390" y="500" text-anchor="middle" fill="#6b7280" font-size="10">acks=all · idempotence=true · manual ack · Avro + Schema Registry</text>
</svg>
