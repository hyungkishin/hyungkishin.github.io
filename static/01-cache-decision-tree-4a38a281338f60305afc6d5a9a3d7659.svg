<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 880" font-family="Pretendard, -apple-system, system-ui, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .node { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
    .node-decision { fill: #fef3c7; stroke: #fcd34d; stroke-width: 1.2; }
    .node-no { fill: #fee2e2; stroke: #fca5a5; stroke-width: 1.2; }
    .node-yes { fill: #d1fae5; stroke: #6ee7b7; stroke-width: 1.4; }
    .node-static { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1.2; }
    .node-cost { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1.2; }
    .text-title { fill: #0f172a; font-size: 17px; font-weight: 700; }
    .text-subtitle { fill: #64748b; font-size: 12.5px; }
    .text { fill: #1f2937; font-size: 13.5px; }
    .text-sub { fill: #4b5563; font-size: 11.5px; }
    .text-no { fill: #991b1b; font-size: 13.5px; font-weight: 700; }
    .text-no-sub { fill: #b91c1c; font-size: 11.5px; }
    .text-yes { fill: #065f46; font-size: 13.5px; font-weight: 700; }
    .text-yes-sub { fill: #047857; font-size: 11.5px; }
    .text-static { fill: #1e3a8a; font-size: 13.5px; font-weight: 700; }
    .text-static-sub { fill: #1d4ed8; font-size: 11.5px; }
    .text-decision { fill: #92400e; font-size: 13.5px; font-weight: 600; }
    .text-cost-title { fill: #4c1d95; font-size: 13px; font-weight: 700; }
    .text-cost { fill: #5b21b6; font-size: 12.5px; font-style: italic; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .arrow-no { stroke: #dc2626; stroke-width: 1.6; fill: none; }
    .arrow-yes { stroke: #10b981; stroke-width: 1.6; fill: none; }
    .label { fill: #475569; font-size: 12px; font-weight: 600; }
    .label-yes { fill: #047857; font-size: 12px; font-weight: 700; }
    .label-no { fill: #b91c1c; font-size: 12px; font-weight: 700; }
  </style>

  <rect class="bg" width="880" height="880"/>

  <text x="440" y="38" text-anchor="middle" class="text-title">CloudFront 캐시 결정 트리</text>
  <text x="440" y="60" text-anchor="middle" class="text-subtitle">빠른 오답이 느린 정답보다 위험하다</text>

  <rect x="340" y="84" width="200" height="50" rx="10" class="node"/>
  <text x="440" y="115" text-anchor="middle" class="text">Incoming Request</text>

  <path d="M440 134 L440 162" class="arrow" marker-end="url(#arrow)"/>

  <polygon points="440,162 580,200 440,238 300,200" class="node-decision"/>
  <text x="440" y="195" text-anchor="middle" class="text-decision">정적 자산?</text>
  <text x="440" y="213" text-anchor="middle" class="text-decision">(/_next/static, font)</text>
  <text x="610" y="205" class="label-yes">Yes</text>
  <text x="245" y="205" class="label-no">No</text>

  <path d="M580 200 L700 200" class="arrow-yes" marker-end="url(#arrow-green)"/>
  <path d="M440 238 L440 266" class="arrow" marker-end="url(#arrow)"/>

  <rect x="700" y="170" width="160" height="60" rx="10" class="node-static"/>
  <text x="780" y="195" text-anchor="middle" class="text-static">max-age=31536000</text>
  <text x="780" y="213" text-anchor="middle" class="text-static-sub">immutable (1년)</text>

  <polygon points="440,266 580,304 440,342 300,304" class="node-decision"/>
  <text x="440" y="298" text-anchor="middle" class="text-decision">경로가 위험한가?</text>
  <text x="440" y="316" text-anchor="middle" class="text-decision">/account, /search,</text>
  <text x="440" y="332" text-anchor="middle" class="text-decision">/preview, /oauth …</text>
  <text x="245" y="309" class="label-no">No</text>
  <text x="610" y="309" class="label-yes">Yes</text>

  <path d="M580 304 L700 304" class="arrow-no" marker-end="url(#arrow-red)"/>
  <path d="M440 342 L440 370" class="arrow" marker-end="url(#arrow)"/>

  <rect x="700" y="274" width="160" height="60" rx="10" class="node-no"/>
  <text x="780" y="299" text-anchor="middle" class="text-no">no-store</text>
  <text x="780" y="317" text-anchor="middle" class="text-no-sub">edge에 절대 안 들어감</text>

  <polygon points="440,370 580,408 440,446 300,408" class="node-decision"/>
  <text x="440" y="402" text-anchor="middle" class="text-decision">위험한 query?</text>
  <text x="440" y="420" text-anchor="middle" class="text-decision">debug, preview, test,</text>
  <text x="440" y="436" text-anchor="middle" class="text-decision">nocache, _vercel …</text>
  <text x="245" y="413" class="label-no">No</text>
  <text x="610" y="413" class="label-yes">Yes</text>

  <path d="M580 408 L700 408" class="arrow-no" marker-end="url(#arrow-red)"/>
  <path d="M440 446 L440 474" class="arrow" marker-end="url(#arrow)"/>

  <rect x="700" y="378" width="160" height="60" rx="10" class="node-no"/>
  <text x="780" y="403" text-anchor="middle" class="text-no">no-store</text>
  <text x="780" y="421" text-anchor="middle" class="text-no-sub">디버깅 응답 캐시 차단</text>

  <polygon points="440,474 580,512 440,550 300,512" class="node-decision"/>
  <text x="440" y="506" text-anchor="middle" class="text-decision">Redirect 응답?</text>
  <text x="440" y="524" text-anchor="middle" class="text-decision">(308, 301)</text>
  <text x="245" y="517" class="label-no">No</text>
  <text x="610" y="517" class="label-yes">Yes</text>

  <path d="M580 512 L700 512" class="arrow-no" marker-end="url(#arrow-red)"/>
  <path d="M440 550 L440 578" class="arrow" marker-end="url(#arrow)"/>

  <rect x="700" y="482" width="160" height="60" rx="10" class="node-no"/>
  <text x="780" y="507" text-anchor="middle" class="text-no">no-store</text>
  <text x="780" y="525" text-anchor="middle" class="text-no-sub">잘못 캐시되면 사고</text>

  <polygon points="440,578 580,616 440,654 300,616" class="node-decision"/>
  <text x="440" y="610" text-anchor="middle" class="text-decision">RSC Flight 요청?</text>
  <text x="440" y="628" text-anchor="middle" class="text-decision">(accept != text/html,</text>
  <text x="440" y="644" text-anchor="middle" class="text-decision">sec-fetch-dest = empty)</text>
  <text x="245" y="621" class="label-no">No</text>
  <text x="610" y="621" class="label-yes">Yes</text>

  <path d="M580 616 L700 616" class="arrow-no" marker-end="url(#arrow-red)"/>
  <path d="M440 654 L440 682" class="arrow-yes" marker-end="url(#arrow-green)"/>

  <rect x="700" y="586" width="160" height="60" rx="10" class="node-no"/>
  <text x="780" y="611" text-anchor="middle" class="text-no">no-store</text>
  <text x="780" y="629" text-anchor="middle" class="text-no-sub">HTML과 같은 객체 금지</text>

  <rect x="270" y="682" width="340" height="76" rx="12" class="node-yes"/>
  <text x="440" y="708" text-anchor="middle" class="text-yes">HTML 요청 (public)</text>
  <text x="440" y="728" text-anchor="middle" class="text-yes-sub">public, max-age=60,</text>
  <text x="440" y="746" text-anchor="middle" class="text-yes-sub">s-maxage=N, stale-while-revalidate=60, Vary: Accept</text>

  <rect x="80" y="788" width="720" height="74" rx="10" class="node-cost"/>
  <text x="100" y="818" class="text-cost-title">포기한 것</text>
  <text x="100" y="840" class="text-cost">redirect의 캐시 이점. prefetch={false}로 끄면 미리 받는 이점도 줄어듦.</text>
  <text x="100" y="858" class="text-cost">대신 빠른 오답이 퍼지는 위험을 막음.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
