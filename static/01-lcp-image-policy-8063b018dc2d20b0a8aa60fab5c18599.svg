<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 740" font-family="Pretendard, -apple-system, system-ui, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .node { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
    .node-decision { fill: #fef3c7; stroke: #fcd34d; stroke-width: 1.2; }
    .node-lcp { fill: #d1fae5; stroke: #6ee7b7; stroke-width: 1.4; }
    .node-aux { fill: #e5e7eb; stroke: #d1d5db; stroke-width: 1.2; }
    .node-cost { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1.2; }
    .text { fill: #1f2937; font-size: 14px; }
    .text-sub { fill: #4b5563; font-size: 12px; }
    .text-title { fill: #0f172a; font-size: 17px; font-weight: 700; }
    .text-subtitle { fill: #64748b; font-size: 12.5px; }
    .text-lcp { fill: #065f46; font-size: 14px; font-weight: 600; }
    .text-lcp-sub { fill: #047857; font-size: 12px; }
    .text-aux { fill: #374151; font-size: 14px; font-weight: 600; }
    .text-aux-sub { fill: #4b5563; font-size: 12px; }
    .text-decision { fill: #92400e; font-size: 14px; font-weight: 600; }
    .text-decision-sub { fill: #b45309; font-size: 11.5px; }
    .text-cost { fill: #5b21b6; font-size: 12.5px; font-style: italic; }
    .text-cost-title { fill: #4c1d95; font-size: 13px; font-weight: 700; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .arrow-yes { stroke: #10b981; stroke-width: 1.8; fill: none; }
    .arrow-no { stroke: #64748b; stroke-width: 1.6; fill: none; }
    .label-yes { fill: #047857; font-size: 12.5px; font-weight: 700; }
    .label-no { fill: #475569; font-size: 12.5px; font-weight: 700; }
  </style>

  <rect class="bg" width="800" height="740"/>

  <text x="400" y="40" text-anchor="middle" class="text-title">홈 상단 이미지: 정책 분기</text>
  <text x="400" y="62" text-anchor="middle" class="text-subtitle">첫 화면에 보일 이미지만 먼저, 나머지는 뒤로</text>

  <rect x="290" y="90" width="220" height="58" rx="10" class="node"/>
  <text x="400" y="116" text-anchor="middle" class="text">홈 상단 이미지</text>
  <text x="400" y="134" text-anchor="middle" class="text-sub">TypeA / B / C / D / E 등 편집 타입</text>

  <path d="M400 148 L400 184" class="arrow" marker-end="url(#arrow)"/>

  <polygon points="400,186 555,250 400,314 245,250" class="node-decision"/>
  <text x="400" y="242" text-anchor="middle" class="text-decision">첫 화면 LCP 후보인가?</text>
  <text x="400" y="262" text-anchor="middle" class="text-decision-sub">렌더 순서(idx === 0) 기준</text>
  <text x="400" y="280" text-anchor="middle" class="text-decision-sub">편집 타입에 묶지 않음</text>

  <text x="205" y="300" text-anchor="middle" class="label-yes">Yes</text>
  <text x="595" y="300" text-anchor="middle" class="label-no">No</text>

  <path d="M260 280 Q170 330 170 370" class="arrow-yes" marker-end="url(#arrow-green)"/>
  <path d="M540 280 Q630 330 630 370" class="arrow-no" marker-end="url(#arrow)"/>

  <rect x="40" y="370" width="260" height="190" rx="12" class="node-lcp"/>
  <text x="170" y="396" text-anchor="middle" class="text-lcp">isLCP = true</text>
  <text x="55" y="424" class="text-lcp-sub">• loading="eager"</text>
  <text x="55" y="446" class="text-lcp-sub">• fetchPriority="high"</text>
  <text x="55" y="468" class="text-lcp-sub">• withSkeleton={false}</text>
  <text x="55" y="490" class="text-lcp-sub">• srcset + sizes 정밀 매칭</text>
  <text x="55" y="512" class="text-lcp-sub">• 첫 번째 영역만 즉시 렌더</text>
  <text x="55" y="534" class="text-lcp-sub">  (idx === 0 → Immediate)</text>

  <rect x="500" y="370" width="260" height="190" rx="12" class="node-aux"/>
  <text x="630" y="396" text-anchor="middle" class="text-aux">기본값 (보조)</text>
  <text x="515" y="424" class="text-aux-sub">• loading="lazy"</text>
  <text x="515" y="446" class="text-aux-sub">• fetchPriority="auto"</text>
  <text x="515" y="468" class="text-aux-sub">• withSkeleton={true}</text>
  <text x="515" y="490" class="text-aux-sub">• 보조 이미지 라인</text>
  <text x="515" y="512" class="text-aux-sub">• 그 외 영역 LazyArea</text>
  <text x="515" y="534" class="text-aux-sub">  (idx ≥ 1)</text>

  <path d="M170 560 L170 596" class="arrow" marker-end="url(#arrow)"/>
  <path d="M630 560 L630 596" class="arrow" marker-end="url(#arrow)"/>

  <rect x="40" y="596" width="260" height="58" rx="10" class="node"/>
  <text x="170" y="620" text-anchor="middle" class="text">LCP / SI 단축</text>
  <text x="170" y="640" text-anchor="middle" class="text-sub">첫 화면 핵심 콘텐츠 등장</text>

  <rect x="500" y="596" width="260" height="58" rx="10" class="node"/>
  <text x="630" y="620" text-anchor="middle" class="text">초기 대역폭 보호</text>
  <text x="630" y="640" text-anchor="middle" class="text-sub">메인 이미지가 대역 확보</text>

  <rect x="80" y="678" width="640" height="50" rx="10" class="node-cost"/>
  <text x="170" y="708" class="text-cost-title">포기한 것</text>
  <text x="400" y="708" text-anchor="middle" class="text-cost">LCP 후보의 skeleton. 예쁜 대기보다 실제 콘텐츠가 먼저 도착하는 쪽.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
