<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="540" fill="#0f172a"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">큐 동작 BEFORE vs AFTER — 거부에서 지연으로</text>

  <!-- ===== LEFT: BEFORE ===== -->
  <text x="220" y="80" fill="#ef4444" font-size="14" font-weight="600" text-anchor="middle">BEFORE · ThreadPoolTaskExecutor</text>

  <!-- caller -->
  <rect x="80" y="110" width="280" height="60" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="220" y="135" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">submit × 6,300</text>
  <text x="220" y="153" fill="#94a3b8" font-size="11" text-anchor="middle">listener 가 task 를 던진다</text>

  <!-- bounded queue -->
  <rect x="80" y="210" width="280" height="60" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="220" y="235" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">유계 큐 (queueCapacity = K)</text>
  <text x="220" y="253" fill="#94a3b8" font-size="11" text-anchor="middle">꽉 차면 더 받지 않는다</text>

  <!-- reject -->
  <rect x="80" y="310" width="280" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="338" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">TaskRejectedException</text>
  <text x="220" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">거부 = 영구 유실</text>
  <text x="220" y="375" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">5,235건 ✕</text>

  <line x1="220" y1="170" x2="220" y2="206" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="220" y1="270" x2="220" y2="306" stroke="#ef4444" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- ===== RIGHT: AFTER ===== -->
  <text x="700" y="80" fill="#10b981" font-size="14" font-weight="600" text-anchor="middle">AFTER · SimpleAsyncTaskExecutor + VT</text>

  <rect x="560" y="110" width="280" height="60" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="700" y="135" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">submit × 6,300</text>
  <text x="700" y="153" fill="#94a3b8" font-size="11" text-anchor="middle">동일하게 listener 가 던진다</text>

  <rect x="560" y="210" width="280" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="235" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">concurrencyLimit = 50, caller 블로킹</text>
  <text x="700" y="253" fill="#94a3b8" font-size="11" text-anchor="middle">초과분은 caller 가 잠깐 막힌다</text>

  <rect x="560" y="310" width="280" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="338" fill="#10b981" font-size="13" font-weight="600" text-anchor="middle">Virtual Thread 로 실행</text>
  <text x="700" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">유실 0 (지연으로 흡수)</text>
  <text x="700" y="375" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">5,235건 ✓ (시간이 걸릴 뿐)</text>

  <line x1="700" y1="170" x2="700" y2="206" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="270" x2="700" y2="306" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ===== Bottom note ===== -->
  <rect x="80" y="430" width="760" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="460" y="458" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">한계</text>
  <text x="460" y="478" fill="#94a3b8" font-size="11" text-anchor="middle">외부 API(Slack/Amplitude) 가 느려지면 caller 가 막혀서 배치 전체가 정체된다.</text>
  <text x="460" y="494" fill="#94a3b8" font-size="11" text-anchor="middle">유실이 사라진 게 아니라 지연으로 옮겨갔을 뿐 — 진짜 답은 Outbox.</text>
</svg>
