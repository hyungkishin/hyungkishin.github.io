<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 760" font-family="Pretendard, -apple-system, system-ui, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .node { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
    .node-server { fill: #d1fae5; stroke: #6ee7b7; stroke-width: 1.4; }
    .node-client { fill: #fef3c7; stroke: #fcd34d; stroke-width: 1.4; }
    .node-cost { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1.2; }
    .panel-server { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 1.5; stroke-dasharray: 4 4; }
    .panel-client { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.5; stroke-dasharray: 4 4; }
    .text-title { fill: #0f172a; font-size: 17px; font-weight: 700; }
    .text-subtitle { fill: #64748b; font-size: 12.5px; }
    .text { fill: #1f2937; font-size: 13.5px; }
    .text-sub { fill: #4b5563; font-size: 12px; }
    .text-server { fill: #065f46; font-size: 14px; font-weight: 700; }
    .text-server-sub { fill: #047857; font-size: 12px; }
    .text-client { fill: #92400e; font-size: 14px; font-weight: 700; }
    .text-client-sub { fill: #b45309; font-size: 12px; }
    .text-cost-title { fill: #4c1d95; font-size: 13px; font-weight: 700; }
    .text-cost { fill: #5b21b6; font-size: 12.5px; font-style: italic; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; }
  </style>

  <rect class="bg" width="820" height="760"/>

  <text x="410" y="40" text-anchor="middle" class="text-title">Home Page: Server / Client 경계</text>
  <text x="410" y="62" text-anchor="middle" class="text-subtitle">CSR 제거가 아니라, CSR이 꼭 필요한 자리만 남김</text>

  <rect x="320" y="92" width="180" height="58" rx="10" class="node"/>
  <text x="410" y="118" text-anchor="middle" class="text">Home Page</text>
  <text x="410" y="136" text-anchor="middle" class="text-sub">한 화면, 두 가지 책임</text>

  <path d="M410 150 L410 184" class="arrow" marker-end="url(#arrow)"/>
  <path d="M410 184 L210 220" class="arrow" marker-end="url(#arrow)"/>
  <path d="M410 184 L610 220" class="arrow" marker-end="url(#arrow)"/>

  <rect x="40" y="220" width="360" height="320" rx="14" class="panel-server"/>
  <text x="60" y="250" class="text-server">Server Component (RSC / SSR)</text>
  <text x="60" y="270" class="text-server-sub">공개 콘텐츠. HTML에 미리 박힘.</text>

  <rect x="60" y="290" width="320" height="42" rx="8" class="node-server"/>
  <text x="220" y="316" text-anchor="middle" class="text">HomeHeaderServer (edition, section)</text>

  <rect x="60" y="340" width="320" height="42" rx="8" class="node-server"/>
  <text x="220" y="366" text-anchor="middle" class="text">Top1 기사 모듈 (LCP 후보 이미지)</text>

  <rect x="60" y="390" width="320" height="42" rx="8" class="node-server"/>
  <text x="220" y="416" text-anchor="middle" class="text">Top 묶음 / Section 기사</text>

  <rect x="60" y="440" width="320" height="42" rx="8" class="node-server"/>
  <text x="220" y="466" text-anchor="middle" class="text">Opinion / MyTimes / Top Stories</text>

  <rect x="60" y="490" width="320" height="42" rx="8" class="node-server"/>
  <text x="220" y="510" text-anchor="middle" class="text">Promise.allSettled 병렬 데이터</text>
  <text x="220" y="525" text-anchor="middle" class="text-sub">보조 실패해도 핵심 살아 있음</text>

  <rect x="420" y="220" width="360" height="320" rx="14" class="panel-client"/>
  <text x="440" y="250" class="text-client">Client Component (CSR)</text>
  <text x="440" y="270" class="text-client-sub">브라우저 환경이 필요한 자리만.</text>

  <rect x="440" y="290" width="320" height="42" rx="8" class="node-client"/>
  <text x="600" y="316" text-anchor="middle" class="text">광고 스크립트 (브라우저 API)</text>

  <rect x="440" y="340" width="320" height="42" rx="8" class="node-client"/>
  <text x="600" y="366" text-anchor="middle" class="text">트래킹 (hydration 이후 행동)</text>

  <rect x="440" y="390" width="320" height="42" rx="8" class="node-client"/>
  <text x="600" y="416" text-anchor="middle" class="text">로그아웃 처리 / 개인화</text>

  <rect x="440" y="440" width="320" height="42" rx="8" class="node-client"/>
  <text x="600" y="466" text-anchor="middle" class="text">모바일 메뉴 / 인터랙션</text>

  <rect x="440" y="490" width="320" height="42" rx="8" class="node-client"/>
  <text x="600" y="510" text-anchor="middle" class="text">Suspense 경계 (스크롤 이후)</text>
  <text x="600" y="525" text-anchor="middle" class="text-sub">로딩 UI가 아니라 경계 설계</text>

  <path d="M220 540 L220 580" class="arrow" marker-end="url(#arrow)"/>
  <path d="M600 540 L600 580" class="arrow" marker-end="url(#arrow)"/>

  <rect x="60" y="580" width="320" height="64" rx="10" class="node"/>
  <text x="220" y="608" text-anchor="middle" class="text">첫 화면 HTML에 이미지 URL 박힘</text>
  <text x="220" y="628" text-anchor="middle" class="text-sub">LCP 출발선이 앞으로 이동</text>

  <rect x="440" y="580" width="320" height="64" rx="10" class="node"/>
  <text x="600" y="608" text-anchor="middle" class="text">CSR이 필요한 자리만 hydration</text>
  <text x="600" y="628" text-anchor="middle" class="text-sub">브라우저 일이 줄어듦</text>

  <rect x="60" y="676" width="700" height="60" rx="10" class="node-cost"/>
  <text x="80" y="706" class="text-cost-title">포기한 것</text>
  <text x="410" y="706" text-anchor="middle" class="text-cost">서버 일이 늘어남. 클라이언트 상태가 필요한 코드를 서버로 잘못 올리면 운영 버그.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
