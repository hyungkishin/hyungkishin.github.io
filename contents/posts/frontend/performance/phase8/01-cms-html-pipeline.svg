<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 920" font-family="Pretendard, -apple-system, system-ui, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .node { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
    .node-step { fill: #e0e7ff; stroke: #a5b4fc; stroke-width: 1.4; }
    .node-policy { fill: #fef3c7; stroke: #fcd34d; stroke-width: 1.2; }
    .node-first { fill: #d1fae5; stroke: #6ee7b7; stroke-width: 1.4; }
    .node-rest { fill: #e5e7eb; stroke: #d1d5db; stroke-width: 1.2; }
    .node-output { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1.4; }
    .node-cost { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1.2; }
    .text-title { fill: #0f172a; font-size: 17px; font-weight: 700; }
    .text-subtitle { fill: #64748b; font-size: 12.5px; }
    .text { fill: #1f2937; font-size: 13.5px; }
    .text-sub { fill: #4b5563; font-size: 11.5px; }
    .text-step { fill: #312e81; font-size: 14px; font-weight: 700; }
    .text-step-sub { fill: #4338ca; font-size: 11.5px; }
    .text-policy { fill: #92400e; font-size: 13px; font-weight: 700; }
    .text-policy-sub { fill: #b45309; font-size: 11.5px; }
    .text-first { fill: #065f46; font-size: 13px; font-weight: 700; }
    .text-first-sub { fill: #047857; font-size: 11.5px; }
    .text-rest { fill: #374151; font-size: 13px; font-weight: 700; }
    .text-rest-sub { fill: #4b5563; font-size: 11.5px; }
    .text-output { fill: #1e3a8a; font-size: 14px; font-weight: 700; }
    .text-output-sub { fill: #1d4ed8; font-size: 11.5px; }
    .text-cost-title { fill: #4c1d95; font-size: 13px; font-weight: 700; }
    .text-cost { fill: #5b21b6; font-size: 12.5px; font-style: italic; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; }
  </style>

  <rect class="bg" width="820" height="920"/>

  <text x="410" y="38" text-anchor="middle" class="text-title">CMS HTML 가공 파이프라인</text>
  <text x="410" y="60" text-anchor="middle" class="text-subtitle">컴포넌트 최적화가 아니라, 렌더링 전 HTML 가공</text>

  <rect x="270" y="86" width="280" height="58" rx="10" class="node"/>
  <text x="410" y="112" text-anchor="middle" class="text">CMS HTML 문자열</text>
  <text x="410" y="130" text-anchor="middle" class="text-sub">에디터 산출물 (img, caption, iframe, …)</text>

  <path d="M410 144 L410 174" class="arrow" marker-end="url(#arrow)"/>

  <rect x="220" y="174" width="380" height="56" rx="10" class="node-step"/>
  <text x="410" y="200" text-anchor="middle" class="text-step">cheerio/slim load (xmlMode: false)</text>
  <text x="410" y="218" text-anchor="middle" class="text-step-sub">DOM처럼 읽기, iframe 깨짐 방지</text>

  <path d="M410 230 L410 254" class="arrow" marker-end="url(#arrow)"/>

  <rect x="220" y="254" width="380" height="56" rx="10" class="node-step"/>
  <text x="410" y="280" text-anchor="middle" class="text-step">extractFeaturedImageSize</text>
  <text x="410" y="298" text-anchor="middle" class="text-step-sub">data-resolved-width / height 수집</text>

  <path d="M410 310 L410 334" class="arrow" marker-end="url(#arrow)"/>

  <rect x="220" y="334" width="380" height="56" rx="10" class="node-step"/>
  <text x="410" y="360" text-anchor="middle" class="text-step">processAllContainers / processInstagramIframes</text>
  <text x="410" y="378" text-anchor="middle" class="text-step-sub">외부 iframe 높이 잡기</text>

  <path d="M410 390 L410 414" class="arrow" marker-end="url(#arrow)"/>

  <rect x="220" y="414" width="380" height="56" rx="10" class="node-step"/>
  <text x="410" y="440" text-anchor="middle" class="text-step">processAllImages</text>
  <text x="410" y="458" text-anchor="middle" class="text-step-sub">이미지 한 장씩 정책 적용</text>

  <path d="M310 470 L160 504" class="arrow" marker-end="url(#arrow)"/>
  <path d="M510 470 L660 504" class="arrow" marker-end="url(#arrow)"/>

  <rect x="40" y="504" width="240" height="100" rx="10" class="node-first"/>
  <text x="160" y="528" text-anchor="middle" class="text-first">첫 번째 이미지</text>
  <text x="55" y="552" class="text-first-sub">• fetchpriority="high"</text>
  <text x="55" y="572" class="text-first-sub">• loading="eager"</text>
  <text x="55" y="592" class="text-first-sub">• LCP 후보</text>

  <rect x="540" y="504" width="240" height="100" rx="10" class="node-rest"/>
  <text x="660" y="528" text-anchor="middle" class="text-rest">두 번째 이후 이미지</text>
  <text x="555" y="552" class="text-rest-sub">• loading="lazy"</text>
  <text x="555" y="572" class="text-rest-sub">• fetchpriority 미지정</text>
  <text x="555" y="592" class="text-rest-sub">• 스크롤 도달 시 로드</text>

  <path d="M160 604 L160 630" class="arrow" marker-end="url(#arrow)"/>
  <path d="M660 604 L660 630" class="arrow" marker-end="url(#arrow)"/>
  <path d="M410 470 L410 630" class="arrow" marker-end="url(#arrow)"/>

  <rect x="40" y="630" width="740" height="98" rx="10" class="node-policy"/>
  <text x="410" y="654" text-anchor="middle" class="text-policy">템플릿별 이미지 정책 + aspect-ratio</text>
  <text x="60" y="680" class="text-policy-sub">• BASIC: pc 728 / mobile 728</text>
  <text x="60" y="700" class="text-policy-sub">• WIDE: pc 1288 / mobile 728 + picture(media 673px)</text>
  <text x="60" y="720" class="text-policy-sub">• DARKROOM: pc 1600 / mobile 728. 원본이 작으면 원본 크기 사용</text>
  <text x="430" y="680" class="text-policy-sub">• data-resolved-width / height → style="aspect-ratio: w / h"</text>
  <text x="430" y="700" class="text-policy-sub">• 기존 query string 제거 후 ?w= 부여</text>
  <text x="430" y="720" class="text-policy-sub">• 첫 이미지 정책 + 템플릿 정책 동시 적용</text>

  <path d="M410 728 L410 760" class="arrow" marker-end="url(#arrow)"/>

  <rect x="220" y="760" width="380" height="62" rx="10" class="node-output"/>
  <text x="410" y="786" text-anchor="middle" class="text-output">processedContents + featuredImageProps</text>
  <text x="410" y="806" text-anchor="middle" class="text-output-sub">React가 렌더링하는 입력은 가공된 HTML</text>

  <rect x="60" y="844" width="700" height="60" rx="10" class="node-cost"/>
  <text x="80" y="872" class="text-cost-title">포기한 것</text>
  <text x="80" y="892" class="text-cost">서버 가공 비용 증가. CMS 케이스 다양성 만큼 테스트 면적도 늘어남.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
