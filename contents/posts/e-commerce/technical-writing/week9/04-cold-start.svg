      <text x="12" y="54" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">product:208</text>
      <text x="250" y="54" fill="#10b981" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">3.12</text>

