      <text x="12" y="90" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">product:415</text>
      <text x="250" y="90" fill="#10b981" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">1.85</text>

