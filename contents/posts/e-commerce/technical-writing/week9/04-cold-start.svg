      <rect x="0" y="72" width="260" height="28" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
      <text x="12" y="90" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">product:415</text>
