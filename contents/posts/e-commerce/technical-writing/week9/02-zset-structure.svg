<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="460" fill="#0f172a"/>

  <text x="430" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">ZSET은 (member, score) 쌍을 score로 정렬된 상태로 유지한다</text>

  <!-- Key label -->
  <rect x="60" y="80" width="280" height="38" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="74" y="104" fill="#94a3b8" font-size="12">KEY</text>
  <text x="110" y="104" fill="#ef4444" font-size="13" font-weight="600">ranking:all:20260410</text>

  <!-- Entries visualized as horizontal bars -->
  <g transform="translate(60, 150)">
    <!-- header -->
    <text x="0" y="0" fill="#64748b" font-size="11">rank</text>
    <text x="60" y="0" fill="#64748b" font-size="11">member</text>
    <text x="200" y="0" fill="#64748b" font-size="11">score</text>
    <text x="420" y="0" fill="#64748b" font-size="11">시각화 (상대 비율)</text>

    <!-- rank 1 -->
    <text x="0" y="30" fill="#e2e8f0" font-size="13" font-weight="600">1</text>
    <text x="60" y="30" fill="#e2e8f0" font-size="13" font-family="ui-monospace, Menlo, monospace">product:101</text>
    <text x="200" y="30" fill="#38bdf8" font-size="13" font-family="ui-monospace, Menlo, monospace">42.7</text>
    <rect x="290" y="18" width="440" height="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="290" y="18" width="440" height="14" fill="#38bdf8" opacity="0.8"/>

    <!-- rank 2 -->
    <text x="0" y="60" fill="#e2e8f0" font-size="13" font-weight="600">2</text>
    <text x="60" y="60" fill="#e2e8f0" font-size="13" font-family="ui-monospace, Menlo, monospace">product:208</text>
    <text x="200" y="60" fill="#38bdf8" font-size="13" font-family="ui-monospace, Menlo, monospace">31.2</text>
    <rect x="290" y="48" width="440" height="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="290" y="48" width="322" height="14" fill="#38bdf8" opacity="0.7"/>

    <!-- rank 3 -->
    <text x="0" y="90" fill="#e2e8f0" font-size="13" font-weight="600">3</text>
    <text x="60" y="90" fill="#e2e8f0" font-size="13" font-family="ui-monospace, Menlo, monospace">product:415</text>
    <text x="200" y="90" fill="#38bdf8" font-size="13" font-family="ui-monospace, Menlo, monospace">18.5</text>
    <rect x="290" y="78" width="440" height="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="290" y="78" width="191" height="14" fill="#38bdf8" opacity="0.6"/>

    <!-- rank 4 -->
    <text x="0" y="120" fill="#e2e8f0" font-size="13" font-weight="600">4</text>
    <text x="60" y="120" fill="#e2e8f0" font-size="13" font-family="ui-monospace, Menlo, monospace">product:733</text>
    <text x="200" y="120" fill="#38bdf8" font-size="13" font-family="ui-monospace, Menlo, monospace">12.1</text>
    <rect x="290" y="108" width="440" height="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="290" y="108" width="125" height="14" fill="#38bdf8" opacity="0.5"/>

    <!-- rank 5 -->
    <text x="0" y="150" fill="#94a3b8" font-size="13">5</text>
    <text x="60" y="150" fill="#94a3b8" font-size="13" font-family="ui-monospace, Menlo, monospace">product:089</text>
    <text x="200" y="150" fill="#94a3b8" font-size="13" font-family="ui-monospace, Menlo, monospace">9.8</text>
    <rect x="290" y="138" width="440" height="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="290" y="138" width="101" height="14" fill="#38bdf8" opacity="0.45"/>

    <text x="0" y="180" fill="#64748b" font-size="13">...</text>
    <text x="60" y="180" fill="#64748b" font-size="13" font-family="ui-monospace, Menlo, monospace">...</text>
  </g>

  <!-- Operations box -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="740" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="20" y="28" fill="#64748b" font-size="11">점수 반영</text>
    <text x="20" y="48" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">ZINCRBY ranking:all:20260410 0.7 product:101</text>
    <text x="20" y="66" fill="#475569" font-size="11">O(log N) — 존재하면 score에 더하고, 없으면 새로 추가한다</text>

    <text x="400" y="28" fill="#64748b" font-size="11">Top-N 조회</text>
    <text x="400" y="48" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">ZREVRANGE ranking:all:20260410 0 19</text>
    <text x="400" y="66" fill="#475569" font-size="11">O(log N + 20) — 내림차순 Top 20을 반환한다</text>
  </g>
</svg>
