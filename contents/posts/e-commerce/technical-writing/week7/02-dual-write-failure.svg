<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arr2r" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e94560"/>
    </marker>
  </defs>

  <rect width="600" height="200" rx="12" fill="#ffffff"/>

  <!-- Node 1: DB INSERT -->
  <rect x="20" y="66" width="130" height="48" rx="8" fill="#2d6a4f" filter="url(#shadow2)"/>
  <text x="85" y="94" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">📝 DB INSERT 성공</text>

  <!-- Arrow -->
  <line x1="150" y1="90" x2="195" y2="90" stroke="#4a5568" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Node 2: Kafka send -->
  <rect x="200" y="66" width="130" height="48" rx="8" fill="#0f3460" filter="url(#shadow2)"/>
  <text x="265" y="94" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">📤 Kafka send</text>

  <!-- Red arrow -->
  <line x1="330" y1="90" x2="375" y2="90" stroke="#e94560" stroke-width="2" marker-end="url(#arr2r)"/>
  <text x="353" y="80" text-anchor="middle" fill="#e94560" font-size="10">네트워크 에러</text>

  <!-- Node 3: 메시지 유실 -->
  <rect x="380" y="66" width="100" height="48" rx="8" fill="#e94560" filter="url(#shadow2)"/>
  <text x="430" y="94" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">❌ 유실</text>

  <!-- Arrow -->
  <line x1="480" y1="90" x2="495" y2="90" stroke="#e94560" stroke-width="2" marker-end="url(#arr2r)"/>

  <!-- Node 4 -->
  <rect x="500" y="56" width="80" height="68" rx="8" fill="#e94560" opacity="0.8" filter="url(#shadow2)"/>
  <text x="540" y="84" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">😱 PENDING</text>
  <text x="540" y="100" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">영구 방치</text>

  <!-- Caption -->
  <text x="300" y="160" text-anchor="middle" fill="#6b7280" font-size="11">DB와 Kafka에 동시에 쓰면, 어느 순서든 불일치가 생긴다</text>
</svg>
