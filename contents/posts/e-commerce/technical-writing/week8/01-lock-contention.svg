<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 580" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="460" height="580" rx="12" fill="#ffffff"/>

  <!-- Title -->
  <text x="230" y="28" text-anchor="middle" fill="#374151" font-size="13" font-weight="700">FOR UPDATE 락 경합이 서비스 전체를 죽이는 과정</text>

  <!-- Node 1: 1만 명 동시 요청 -->
  <rect x="130" y="46" width="200" height="48" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="230" y="74" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">👥 1만 명 동시 주문</text>

  <line x1="230" y1="94" x2="230" y2="120" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2: FOR UPDATE 경합 -->
  <rect x="100" y="124" width="260" height="48" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="230" y="152" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">🔒 SELECT FOR UPDATE 경합</text>

  <line x1="230" y1="172" x2="230" y2="198" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 3: 50개 커넥션 전부 락 대기 -->
  <rect x="80" y="202" width="300" height="56" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="230" y="226" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">⏳ 커넥션 50개 전부 락 대기</text>
  <text x="230" y="246" text-anchor="middle" fill="#8b95a5" font-size="11">처리 200ms × 직렬화 = 실질 TPS 급감</text>

  <line x1="230" y1="258" x2="230" y2="284" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 4: 51번째 요청부터 connectionTimeout -->
  <rect x="65" y="288" width="330" height="56" rx="8" fill="#533483" filter="url(#shadow)"/>
  <text x="230" y="312" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">💀 51번째 요청부터 풀 밖 대기</text>
  <text x="230" y="332" text-anchor="middle" fill="#8b95a5" font-size="11">HikariCP connectionTimeout 30초 후 예외</text>

  <line x1="230" y1="344" x2="230" y2="370" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 5: 장애 전파 -->
  <rect x="50" y="374" width="360" height="64" rx="8" fill="#e94560" filter="url(#shadow)"/>
  <text x="230" y="400" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">🔥 상품 조회 · 브랜드 목록 · 쿠폰 발급</text>
  <text x="230" y="422" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">락과 무관한 API까지 전부 마비</text>

  <!-- 하단 비교 박스 -->
  <rect x="30" y="464" width="185" height="80" rx="8" fill="#2d6a4f" filter="url(#shadow)"/>
  <text x="122" y="490" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">✅ 정합성</text>
  <text x="122" y="510" text-anchor="middle" fill="#c6e0d0" font-size="11">재고 음수 안 됨</text>
  <text x="122" y="526" text-anchor="middle" fill="#c6e0d0" font-size="11">쿠폰 이중 사용 안 됨</text>

  <rect x="245" y="464" width="185" height="80" rx="8" fill="#e94560" filter="url(#shadow)"/>
  <text x="337" y="490" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">❌ 가용성</text>
  <text x="337" y="510" text-anchor="middle" fill="#ffd0d0" font-size="11">커넥션 풀 고갈</text>
  <text x="337" y="526" text-anchor="middle" fill="#ffd0d0" font-size="11">전체 서비스 마비</text>

  <!-- Caption -->
  <text x="230" y="568" text-anchor="middle" fill="#6b7280" font-size="11">정합성은 지켜지지만, 서비스가 죽으면 의미가 없다</text>
</svg>
