<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#0f172a"/>

  <!-- ===== Kafka Topic Box ===== -->
  <rect x="40" y="30" width="640" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="58" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="0.5">Kafka Topic</text>
  <text x="190" y="58" font-size="13" fill="#64748b">notification-fail-v1</text>

  <!-- Messages inside topic -->
  <rect x="60" y="75" width="140" height="65" rx="8" fill="#1a3a2a" stroke="#2d6a4f" stroke-width="1.2"/>
  <text x="130" y="100" font-size="12" font-weight="600" fill="#4ade80" text-anchor="middle">내 서비스</text>
  <text x="130" y="118" font-size="11" fill="#6ee7b7" text-anchor="middle">실패 메시지</text>

  <rect x="215" y="75" width="140" height="65" rx="8" fill="#2a1a1a" stroke="#4a4a4a" stroke-width="1.2"/>
  <text x="285" y="100" font-size="12" font-weight="600" fill="#a1a1aa" text-anchor="middle">서비스 A</text>
  <text x="285" y="118" font-size="11" fill="#71717a" text-anchor="middle">실패 메시지</text>

  <rect x="370" y="75" width="140" height="65" rx="8" fill="#2a1a1a" stroke="#4a4a4a" stroke-width="1.2"/>
  <text x="440" y="100" font-size="12" font-weight="600" fill="#a1a1aa" text-anchor="middle">기타 서비스</text>
  <text x="440" y="118" font-size="11" fill="#71717a" text-anchor="middle">실패 메시지</text>

  <rect x="525" y="75" width="140" height="65" rx="8" fill="#2a1a1a" stroke="#4a4a4a" stroke-width="1.2"/>
  <text x="595" y="100" font-size="12" font-weight="600" fill="#a1a1aa" text-anchor="middle">기타 서비스</text>
  <text x="595" y="118" font-size="11" fill="#71717a" text-anchor="middle">실패 메시지</text>

  <!-- ===== Arrow 1: Topic -> Consumer ===== -->
  <line x1="360" y1="160" x2="360" y2="228" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="350,224 360,238 370,224" fill="#94a3b8"/>
  <text x="360" y="195" font-size="10" fill="#e94560" font-weight="600" text-anchor="middle">전부 consume</text>

  <!-- ===== Consumer Box ===== -->
  <rect x="200" y="245" width="320" height="55" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="269" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle">NotificationFailConsumer</text>
  <text x="360" y="288" font-size="11" fill="#94a3b8" text-anchor="middle">concurrency=1, maxPoll=10</text>

  <!-- ===== Arrow 2: Consumer -> Handler ===== -->
  <line x1="360" y1="300" x2="360" y2="358" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="350,354 360,368 370,354" fill="#94a3b8"/>
  <text x="360" y="332" font-size="10" fill="#4ade80" font-weight="600" text-anchor="middle">내 메시지만 처리</text>

  <!-- ===== Handler Box ===== -->
  <rect x="230" y="375" width="260" height="50" rx="10" fill="#1e293b" stroke="#2d6a4f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="398" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle">FailHandler</text>
  <text x="360" y="415" font-size="10" fill="#6ee7b7" text-anchor="middle">내 서비스 메시지만 처리</text>

  <!-- ===== Arrow 3: Handler -> Fallback ===== -->
  <line x1="360" y1="425" x2="360" y2="458" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="350,454 360,468 370,454" fill="#94a3b8"/>

  <!-- ===== Fallback Box ===== -->
  <rect x="230" y="470" width="260" height="35" rx="10" fill="#0f3460" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="493" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle">FallbackService — SMS 대체 발송</text>
</svg>