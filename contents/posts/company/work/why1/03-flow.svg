<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="560" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">요청 한 건이 어디까지 가는가 — 세 갈래</text>
  <text x="460" y="58" fill="#64748b" font-size="12" text-anchor="middle">L1 hit / L1 miss → L2 hit / L1 + L2 miss (분산 lock)</text>

  <defs>
    <marker id="arrA" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrC" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- A: L1 hit -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="270" height="400" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="135" y="28" fill="#10b981" font-size="13" font-weight="600" text-anchor="middle">A. L1 hit</text>
    <text x="135" y="46" fill="#94a3b8" font-size="11" text-anchor="middle">대부분의 요청 — RTT 0, parse 0</text>

    <rect x="30" y="80" width="210" height="44" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="135" y="100" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">Caller</text>
    <text x="135" y="116" fill="#94a3b8" font-size="11" text-anchor="middle">findByYearAndKey()</text>

    <line x1="135" y1="124" x2="135" y2="160" stroke="#10b981" stroke-width="2" marker-end="url(#arrA)"/>

    <rect x="30" y="170" width="210" height="56" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="190" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">L1 (Caffeine)</text>
    <text x="135" y="208" fill="#94a3b8" font-size="11" text-anchor="middle">l1.get(year) → Map</text>
    <text x="135" y="220" fill="#64748b" font-size="10" text-anchor="middle">in-process</text>

    <line x1="135" y1="226" x2="135" y2="260" stroke="#10b981" stroke-width="2" marker-end="url(#arrA)"/>

    <rect x="30" y="270" width="210" height="44" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="290" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">Result.Ok(value)</text>
    <text x="135" y="306" fill="#94a3b8" font-size="11" text-anchor="middle">µs 단위</text>

    <text x="135" y="356" fill="#475569" font-size="11" text-anchor="middle">Redis 호출 0회</text>
    <text x="135" y="374" fill="#475569" font-size="11" text-anchor="middle">DB 호출 0회</text>
  </g>

  <!-- B: L1 miss -> L2 hit -->
  <g transform="translate(325, 100)">
    <rect x="0" y="0" width="270" height="400" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="135" y="28" fill="#38bdf8" font-size="13" font-weight="600" text-anchor="middle">B. L1 miss → L2 hit</text>
    <text x="135" y="46" fill="#94a3b8" font-size="11" text-anchor="middle">새 pod 처음 / TTL 만료 직후</text>

    <rect x="30" y="80" width="210" height="44" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="100" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">L1 (miss)</text>
    <text x="135" y="116" fill="#94a3b8" font-size="11" text-anchor="middle">single-flight loader 실행</text>

    <line x1="135" y1="124" x2="135" y2="160" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrB)"/>

    <rect x="30" y="170" width="210" height="56" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="135" y="190" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">L2 (Redis GET)</text>
    <text x="135" y="208" fill="#94a3b8" font-size="11" text-anchor="middle">Map JSON parse 1회</text>
    <text x="135" y="220" fill="#64748b" font-size="10" text-anchor="middle">RTT 1~5 ms</text>

    <line x1="135" y1="226" x2="135" y2="260" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrB)"/>

    <rect x="30" y="270" width="210" height="44" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="290" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">L1.put(year, map)</text>
    <text x="135" y="306" fill="#94a3b8" font-size="11" text-anchor="middle">이후 요청은 A 흐름</text>

    <text x="135" y="356" fill="#475569" font-size="11" text-anchor="middle">같은 pod 동시 N건</text>
    <text x="135" y="374" fill="#475569" font-size="11" text-anchor="middle">→ loader 1번만 실행</text>
  </g>

  <!-- C: L1 + L2 miss (cold) -->
  <g transform="translate(610, 100)">
    <rect x="0" y="0" width="270" height="400" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="135" y="28" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">C. L1 + L2 miss (cold)</text>
    <text x="135" y="46" fill="#94a3b8" font-size="11" text-anchor="middle">새 year 진입 / 운영 invalidate 직후</text>

    <rect x="30" y="80" width="210" height="44" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="135" y="100" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">SETNX lock::{year}</text>
    <text x="135" y="116" fill="#94a3b8" font-size="11" text-anchor="middle">TTL 10s · podId 페이로드</text>

    <line x1="135" y1="124" x2="135" y2="160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrC)"/>

    <rect x="30" y="170" width="210" height="56" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
    <text x="135" y="190" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">획득한 pod → DB read</text>
    <text x="135" y="208" fill="#94a3b8" font-size="11" text-anchor="middle">findAllByYear()</text>
    <text x="135" y="220" fill="#64748b" font-size="10" text-anchor="middle">실패 pod은 50ms × 5 polling</text>

    <line x1="135" y1="226" x2="135" y2="260" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrC)"/>

    <rect x="30" y="270" width="210" height="44" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="135" y="290" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">L2 SET + Lua DEL lock</text>
    <text x="135" y="306" fill="#94a3b8" font-size="11" text-anchor="middle">compare-and-del (race-safe)</text>

    <text x="135" y="356" fill="#475569" font-size="11" text-anchor="middle">전 클러스터 DB hit 1회로 수렴</text>
    <text x="135" y="374" fill="#475569" font-size="11" text-anchor="middle">stampede 방지</text>
  </g>

  <!-- Bottom note -->
  <rect x="40" y="520" width="840" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="460" y="541" fill="#94a3b8" font-size="12" text-anchor="middle">A가 일상, B는 분 단위, C는 새 year 또는 invalidate 후 1회</text>
</svg>
