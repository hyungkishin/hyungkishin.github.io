<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="540" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">Before vs After — 매 요청 비용 분해</text>
  <text x="460" y="58" fill="#64748b" font-size="12" text-anchor="middle">RTT와 JSON parse를 동시에 0으로 떨어뜨린다</text>

  <defs>
    <marker id="arrTrans" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- BEFORE panel -->
  <rect x="40" y="100" width="380" height="380" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="128" fill="#ef4444" font-size="14" font-weight="600" text-anchor="middle">Before</text>
  <text x="230" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">매 hit이 Redis까지 다녀와서 큰 Map을 통째로 풀어쓴다</text>

  <g transform="translate(60, 178)">
    <rect x="0" y="0" width="340" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="14" y="25" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">Redis RTT (intra-AZ)</text>
    <text x="326" y="25" fill="#ef4444" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">0.3 ~ 1 ms</text>

    <rect x="0" y="50" width="340" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="14" y="75" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">payload (수백 KB)</text>
    <text x="326" y="75" fill="#ef4444" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">1 ~ 수 ms</text>

    <rect x="0" y="100" width="340" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="14" y="125" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">Jackson readValue (수천 entry)</text>
    <text x="326" y="125" fill="#ef4444" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">1 ~ 5 ms</text>

    <rect x="0" y="150" width="340" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="14" y="175" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace">key lookup</text>
    <text x="326" y="175" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">µs</text>

    <rect x="0" y="210" width="340" height="48" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
    <text x="14" y="232" fill="#94a3b8" font-size="11">데이터 정정 시 자연 정합까지</text>
    <text x="326" y="232" fill="#ef4444" font-size="13" font-weight="600" text-anchor="end">~24h</text>
    <text x="14" y="250" fill="#94a3b8" font-size="11">Redis 장애 시</text>
    <text x="326" y="250" fill="#ef4444" font-size="13" font-weight="600" text-anchor="end">5xx 위험</text>
  </g>

  <!-- Arrow -->
  <line x1="430" y1="280" x2="490" y2="280" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrTrans)"/>
  <text x="460" y="262" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">L1 추가</text>
  <text x="460" y="302" fill="#64748b" font-size="10" text-anchor="middle">+ Pub/Sub</text>

  <!-- AFTER panel -->
  <rect x="500" y="100" width="380" height="380" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="690" y="128" fill="#10b981" font-size="14" font-weight="600" text-anchor="middle">After</text>
  <text x="690" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">99% L1 hit · RTT 0 · parse 0</text>

  <g transform="translate(520, 178)">
    <rect x="0" y="0" width="340" height="40" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="25" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">L1 lookup (in-process Map)</text>
    <text x="326" y="25" fill="#10b981" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">µs</text>

    <rect x="0" y="50" width="340" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="14" y="75" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace">Redis RTT</text>
    <text x="326" y="75" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">0 (skip)</text>

    <rect x="0" y="100" width="340" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="14" y="125" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace">Jackson readValue</text>
    <text x="326" y="125" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">0 (skip)</text>

    <rect x="0" y="150" width="340" height="40" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="175" fill="#e2e8f0" font-size="12" font-family="ui-monospace, Menlo, monospace">key lookup</text>
    <text x="326" y="175" fill="#10b981" font-size="12" font-family="ui-monospace, Menlo, monospace" text-anchor="end">µs</text>

    <rect x="0" y="210" width="340" height="48" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <text x="14" y="232" fill="#94a3b8" font-size="11">데이터 정정 시 반영</text>
    <text x="326" y="232" fill="#10b981" font-size="13" font-weight="600" text-anchor="end">즉시 (Pub/Sub)</text>
    <text x="14" y="250" fill="#94a3b8" font-size="11">Redis 장애 시</text>
    <text x="326" y="250" fill="#10b981" font-size="13" font-weight="600" text-anchor="end">L1 hit이면 OK</text>
  </g>

  <!-- Bottom note -->
  <rect x="40" y="500" width="840" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="460" y="521" fill="#94a3b8" font-size="12" text-anchor="middle">L2 키 그대로 유지 → 마이그레이션 0 / rollback은 config flag 한 줄</text>
</svg>
