<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="560" fill="#0f172a"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">장애 발생 흐름 — DB는 통과했지만 이벤트와 enum이 무너졌다</text>

  <!-- 1. 배치 -->
  <rect x="360" y="70" width="200" height="70" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="460" y="98" fill="#38bdf8" font-size="13" font-weight="600" text-anchor="middle">admin-api 배치</text>
  <text x="460" y="118" fill="#94a3b8" font-size="11" text-anchor="middle">UPDATE workflow 2,100건</text>
  <text x="460" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">EXPIRED_AUTO commit</text>

  <!-- 2. DB -->
  <rect x="360" y="180" width="200" height="60" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="206" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">DB</text>
  <text x="460" y="224" fill="#94a3b8" font-size="11" text-anchor="middle">workflow_status = EXPIRED_AUTO</text>

  <!-- 3-A. 이벤트 fan-out -->
  <rect x="80" y="290" width="280" height="80" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="220" y="316" fill="#a78bfa" font-size="13" font-weight="600" text-anchor="middle">이벤트 fan-out</text>
  <text x="220" y="336" fill="#94a3b8" font-size="11" text-anchor="middle">2,100 × 3 listener = 6,300 task</text>
  <text x="220" y="352" fill="#94a3b8" font-size="11" text-anchor="middle">Slack / Analytics / Sms</text>

  <!-- 4-A. 큐 거부 -->
  <rect x="80" y="410" width="280" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="436" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">큐 소진 → 거부 → 영구 유실</text>
  <text x="220" y="456" fill="#94a3b8" font-size="11" text-anchor="middle">TaskRejectedException</text>
  <text x="220" y="472" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">5,235건 ✕</text>

  <!-- 3-B. app-api 진입 -->
  <rect x="560" y="290" width="280" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="316" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">app-api · core-domain</text>
  <text x="700" y="336" fill="#94a3b8" font-size="11" text-anchor="middle">DB row 역직렬화</text>
  <text x="700" y="352" fill="#94a3b8" font-size="11" text-anchor="middle">(EXPIRED_AUTO 미배포)</text>

  <!-- 4-B. enum 미배포 에러 -->
  <rect x="560" y="410" width="280" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="436" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">No enum constant 에러</text>
  <text x="700" y="456" fill="#94a3b8" font-size="11" text-anchor="middle">IllegalArgumentException</text>
  <text x="700" y="472" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">사용자 500 에러 9건</text>

  <!-- Arrows: 배치 → DB -->
  <line x1="460" y1="140" x2="460" y2="176" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DB → fan-out (왼쪽 분기) -->
  <path d="M 400 240 Q 400 270 280 286" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- DB → app-api (오른쪽 분기) -->
  <path d="M 520 240 Q 520 270 640 286" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- fan-out → 거부 -->
  <line x1="220" y1="370" x2="220" y2="406" stroke="#ef4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <!-- app-api → enum 에러 -->
  <line x1="700" y1="370" x2="700" y2="406" stroke="#ef4444" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Footnote -->
  <text x="460" y="528" fill="#475569" font-size="11" text-anchor="middle">DB 커밋은 끝났지만, 이벤트는 거부되어 사라졌고 다른 서버는 새 enum을 읽지 못했다</text>
</svg>
