<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="480" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">정합성 경계의 이동 — DB 커밋에서 DB+Outbox 같은 트랜잭션으로</text>

  <!-- ===== BEFORE row ===== -->
  <text x="60" y="100" fill="#ef4444" font-size="14" font-weight="600">BEFORE</text>
  <text x="60" y="118" fill="#94a3b8" font-size="11">정합성은 DB 커밋까지만. 그 너머는 보장 없음.</text>

  <!-- DB 커밋 -->
  <rect x="60" y="140" width="240" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="180" y="166" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">DB 커밋</text>
  <text x="180" y="184" fill="#94a3b8" font-size="11" text-anchor="middle">트랜잭션으로 보장</text>

  <!-- 경계선 -->
  <line x1="310" y1="130" x2="310" y2="210" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="310" y="124" fill="#f59e0b" font-size="11" text-anchor="middle">정합성 경계</text>

  <!-- 이벤트 발행 (보장 X) -->
  <rect x="320" y="140" width="540" height="60" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="166" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">이벤트 발행 (in-memory executor)</text>
  <text x="590" y="184" fill="#94a3b8" font-size="11" text-anchor="middle">큐 거부 / pod 죽음 / 외부 API 실패 → 유실</text>

  <!-- ===== AFTER row ===== -->
  <text x="60" y="270" fill="#10b981" font-size="14" font-weight="600">NEXT (Outbox 도입 후)</text>
  <text x="60" y="288" fill="#94a3b8" font-size="11">상태 전이와 outbox INSERT 가 같은 트랜잭션. 경계가 밖으로 한 칸 이동.</text>

  <!-- DB + outbox -->
  <rect x="60" y="310" width="380" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="250" y="336" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">DB 커밋 + outbox INSERT</text>
  <text x="250" y="354" fill="#94a3b8" font-size="11" text-anchor="middle">같은 트랜잭션으로 묶임</text>

  <!-- 경계선 -->
  <line x1="450" y1="300" x2="450" y2="380" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="450" y="294" fill="#f59e0b" font-size="11" text-anchor="middle">정합성 경계</text>

  <!-- consumer + DLQ -->
  <rect x="460" y="310" width="400" height="60" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="660" y="336" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">OutboxPublisher + retry + DLQ</text>
  <text x="660" y="354" fill="#94a3b8" font-size="11" text-anchor="middle">실패해도 재처리 가능, 유실 0</text>

  <!-- Footnote -->
  <text x="460" y="430" fill="#475569" font-size="11" text-anchor="middle">"DB 는 됐는데 이벤트가 안 갔다" 는 상태가 구조적으로 사라진다</text>
</svg>
