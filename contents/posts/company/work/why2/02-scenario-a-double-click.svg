<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="540" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">시나리오 A — 인증요청 두 번 클릭, 세션이 덮어쓰여진다</text>

  <defs>
    <marker id="arrG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Lifelines -->
  <g stroke="#334155" stroke-dasharray="4 4">
    <line x1="100" y1="100" x2="100" y2="510"/>
    <line x1="320" y1="100" x2="320" y2="510"/>
    <line x1="520" y1="100" x2="520" y2="510"/>
    <line x1="730" y1="100" x2="730" y2="510"/>
  </g>

  <!-- Actors -->
  <rect x="40" y="68" width="120" height="36" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="91" fill="#e2e8f0" font-size="12" text-anchor="middle">사용자</text>

  <rect x="240" y="68" width="160" height="36" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="320" y="91" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">workflow-api</text>

  <rect x="450" y="68" width="140" height="36" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="520" y="91" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Redis 세션</text>

  <rect x="650" y="68" width="160" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="91" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">외부 게이트웨이</text>

  <!-- 1차 인증요청 -->
  <line x1="100" y1="135" x2="316" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="208" y="127" fill="#94a3b8" font-size="11" text-anchor="middle">① 인증요청 (1차)</text>
  <text x="208" y="151" fill="#475569" font-size="10" text-anchor="middle">status → AUTH_REQUESTED</text>

  <line x1="324" y1="170" x2="516" y2="170" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrP)"/>
  <text x="420" y="162" fill="#a78bfa" font-size="11" text-anchor="middle">세션₁ 저장</text>

  <line x1="324" y1="200" x2="726" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="525" y="192" fill="#f59e0b" font-size="11" text-anchor="middle">호출 → 푸시 ①</text>

  <!-- dedup 가드 박스 -->
  <rect x="240" y="240" width="280" height="62" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="380" y="261" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">isAuthInProgress() == false</text>
  <text x="380" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">AUTH_IN_PROGRESS_STATUSES 에</text>
  <text x="380" y="293" fill="#94a3b8" font-size="11" text-anchor="middle">AUTH_REQUESTED 가 빠져 있음</text>

  <!-- 2차 인증요청 -->
  <line x1="100" y1="335" x2="316" y2="335" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="208" y="327" fill="#ef4444" font-size="11" text-anchor="middle">② 인증요청 (2차) — 안 와서 다시 누름</text>

  <line x1="324" y1="370" x2="516" y2="370" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="420" y="362" fill="#ef4444" font-size="11" text-anchor="middle">세션₂ 가 세션₁ 덮어씀</text>

  <line x1="324" y1="400" x2="726" y2="400" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="525" y="392" fill="#ef4444" font-size="11" text-anchor="middle">호출 → 푸시 ②</text>

  <!-- 사용자 첫 푸시 승인 -->
  <line x1="100" y1="440" x2="726" y2="440" stroke="#64748b" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrG)"/>
  <text x="413" y="432" fill="#94a3b8" font-size="11" text-anchor="middle">사용자가 첫 푸시 승인 (게이트웨이는 ① 승인으로 인식)</text>

  <!-- sign mismatch -->
  <line x1="730" y1="475" x2="324" y2="475" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="525" y="467" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">sign 단계 mismatch → 5xx</text>
  <text x="525" y="495" fill="#94a3b8" font-size="11" text-anchor="middle">"인증 처리 실패입니다. 다시 시도하세요"</text>
</svg>
