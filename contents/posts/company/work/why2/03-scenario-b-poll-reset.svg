<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="480" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">시나리오 B — 사전 설문 reset 으로 dedup 의 전제가 깨진다</text>

  <defs>
    <marker id="arrG3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrR3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Step 1: PRE_POLL_DONE -->
  <rect x="340" y="90" width="240" height="56" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="115" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">primaryAuth = PRE_POLL_DONE</text>
  <text x="460" y="133" fill="#94a3b8" font-size="11" text-anchor="middle">사전 설문 ① 완료</text>

  <line x1="460" y1="148" x2="460" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#arrG3)"/>
  <text x="490" y="168" fill="#94a3b8" font-size="11">인증요청 ①</text>

  <!-- Step 2: AUTH_REQUESTED -->
  <rect x="340" y="190" width="240" height="56" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="460" y="215" fill="#38bdf8" font-size="13" font-weight="600" text-anchor="middle">primaryAuth = AUTH_REQUESTED</text>
  <text x="460" y="233" fill="#94a3b8" font-size="11" text-anchor="middle">세션₁ 저장, 푸시 ① 발송</text>

  <line x1="460" y1="248" x2="460" y2="288" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrR3)"/>
  <text x="600" y="265" fill="#ef4444" font-size="12" font-weight="600">savePoll() — 결함 3</text>
  <text x="600" y="280" fill="#94a3b8" font-size="11">사전 설문이 다시 들어옴</text>

  <!-- Step 3: reset -->
  <rect x="340" y="300" width="240" height="56" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="460" y="325" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">primaryAuth = PRE_POLL_DONE</text>
  <text x="460" y="343" fill="#94a3b8" font-size="11" text-anchor="middle">강제 reset (인증 진행 무시)</text>

  <line x1="460" y1="358" x2="460" y2="388" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR3)"/>
  <text x="490" y="378" fill="#ef4444" font-size="11">인증요청 ②</text>

  <!-- Step 4: AUTH_REQUESTED again, but dedup never triggers -->
  <rect x="280" y="400" width="360" height="56" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="460" y="425" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">dedup 미작동 → 외부 호출 또 나감</text>
  <text x="460" y="443" fill="#94a3b8" font-size="11" text-anchor="middle">isAuthInProgress() 가 PRE_POLL_DONE 을 보고 통과시킴</text>

  <!-- Side note -->
  <rect x="40" y="190" width="240" height="166" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="160" y="215" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">결함 1 과 결함 3 의 관계</text>
  <text x="56" y="240" fill="#475569" font-size="10">- 결함 1 만 있으면 두 번째 클릭에서</text>
  <text x="56" y="255" fill="#475569" font-size="10">  dedup 이 막아야 할 위치가 있다</text>
  <text x="56" y="278" fill="#475569" font-size="10">- 결함 3 이 그 위치보다 먼저 status 를</text>
  <text x="56" y="293" fill="#475569" font-size="10">  PRE_POLL_DONE 으로 돌려놓는다</text>
  <text x="56" y="316" fill="#475569" font-size="10">- 그 결과 dedup 분기 자체가</text>
  <text x="56" y="331" fill="#475569" font-size="10">  무관한 코드가 되어버린다</text>
</svg>
