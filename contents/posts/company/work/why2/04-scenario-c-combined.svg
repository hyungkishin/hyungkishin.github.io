<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="620" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">시나리오 C — 결함 1 과 3 이 동시에 발현되는 시간순 흐름</text>

  <defs>
    <marker id="arrG4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrR4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrB4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <!-- Lifelines -->
  <g stroke="#334155" stroke-dasharray="4 4">
    <line x1="100" y1="100" x2="100" y2="590"/>
    <line x1="290" y1="100" x2="290" y2="590"/>
    <line x1="490" y1="100" x2="490" y2="590"/>
    <line x1="680" y1="100" x2="680" y2="590"/>
    <line x1="840" y1="100" x2="840" y2="590"/>
  </g>

  <!-- Actors -->
  <rect x="50" y="68" width="100" height="36" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="91" fill="#e2e8f0" font-size="11" text-anchor="middle">사용자</text>

  <rect x="220" y="68" width="140" height="36" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="290" y="91" fill="#38bdf8" font-size="11" font-weight="600" text-anchor="middle">workflow-api</text>

  <rect x="430" y="68" width="120" height="36" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="490" y="91" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">Redis 세션</text>

  <rect x="610" y="68" width="140" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="91" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">게이트웨이</text>

  <rect x="780" y="68" width="120" height="36" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="840" y="91" fill="#10b981" font-size="11" font-weight="600" text-anchor="middle">수집기</text>

  <!-- Step 1: 사전 설문 + 인증 ① -->
  <line x1="100" y1="135" x2="286" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arrG4)"/>
  <text x="193" y="127" fill="#94a3b8" font-size="10" text-anchor="middle">① 사전 설문 + 인증요청</text>

  <line x1="294" y1="160" x2="486" y2="160" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrG4)"/>
  <text x="390" y="153" fill="#a78bfa" font-size="10" text-anchor="middle">세션₁ 저장</text>

  <line x1="294" y1="185" x2="676" y2="185" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrG4)"/>
  <text x="485" y="178" fill="#f59e0b" font-size="10" text-anchor="middle">호출 1회 → 푸시 ①</text>

  <!-- 결함 3 zone -->
  <rect x="40" y="210" width="860" height="86" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="60" y="232" fill="#ef4444" font-size="11" font-weight="600">결함 3 — savePoll 이 status 를 PRE_POLL_DONE 으로 강제 reset</text>

  <line x1="100" y1="252" x2="286" y2="252" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="193" y="245" fill="#ef4444" font-size="10" text-anchor="middle">② 사전 설문 다시 (답변 수정)</text>

  <line x1="100" y1="280" x2="286" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="193" y="273" fill="#ef4444" font-size="10" text-anchor="middle">인증요청 ②</text>

  <line x1="294" y1="320" x2="486" y2="320" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="390" y="313" fill="#ef4444" font-size="10" text-anchor="middle">세션₂ 가 ₁ 덮어씀</text>

  <line x1="294" y1="345" x2="676" y2="345" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="485" y="338" fill="#ef4444" font-size="10" text-anchor="middle">호출 2회 → 푸시 ②</text>

  <!-- 결함 1 zone -->
  <rect x="40" y="370" width="860" height="80" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="60" y="392" fill="#ef4444" font-size="11" font-weight="600">결함 1 — dedup 미작동, 인증요청 한 번 더</text>

  <line x1="100" y1="412" x2="286" y2="412" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="193" y="405" fill="#ef4444" font-size="10" text-anchor="middle">③ 인증요청 또</text>

  <line x1="294" y1="437" x2="486" y2="437" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR4)"/>
  <text x="390" y="430" fill="#ef4444" font-size="10" text-anchor="middle">세션₃ 가 ₂ 덮어씀, 호출 3회</text>

  <!-- sign + collect -->
  <line x1="294" y1="475" x2="676" y2="475" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrB4)"/>
  <text x="485" y="468" fill="#38bdf8" font-size="10" text-anchor="middle">sign (세션₃ 사용)</text>

  <line x1="294" y1="500" x2="836" y2="500" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrB4)"/>
  <text x="565" y="493" fill="#38bdf8" font-size="10" text-anchor="middle">SQS → 수집 요청</text>

  <!-- 외부 거절 -->
  <line x1="840" y1="535" x2="294" y2="535" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrR4)"/>
  <text x="565" y="527" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">수집기 → INVALID_SESSION (세션 mismatch)</text>

  <text x="460" y="568" fill="#94a3b8" font-size="11" text-anchor="middle">primaryAuth = COLLECT_FAIL, 운영 알림 발송</text>
  <text x="460" y="585" fill="#475569" font-size="10" text-anchor="middle">자동 재시도 제외 정책에 INVALID_SESSION 포함 → 자동 복구 불가</text>
</svg>
