<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="520" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">정상 흐름 — 한 번만 흘러갈 때만 안전하다</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Lifelines -->
  <g stroke="#334155" stroke-dasharray="4 4">
    <line x1="100" y1="100" x2="100" y2="490"/>
    <line x1="320" y1="100" x2="320" y2="490"/>
    <line x1="520" y1="100" x2="520" y2="490"/>
    <line x1="730" y1="100" x2="730" y2="490"/>
  </g>

  <!-- Actors -->
  <rect x="40" y="68" width="120" height="36" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="91" fill="#e2e8f0" font-size="12" text-anchor="middle">사용자</text>

  <rect x="240" y="68" width="160" height="36" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="320" y="91" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">workflow-api</text>

  <rect x="450" y="68" width="140" height="36" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="520" y="91" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Redis 세션</text>

  <rect x="650" y="68" width="160" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="91" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">외부 게이트웨이</text>

  <!-- Step 1 -->
  <line x1="100" y1="140" x2="316" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="208" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">① 사전 설문 완료</text>
  <text x="208" y="156" fill="#475569" font-size="10" text-anchor="middle">primaryAuth = PRE_POLL_DONE</text>

  <!-- Step 2 -->
  <line x1="100" y1="190" x2="316" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="208" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">② 인증요청</text>

  <line x1="324" y1="215" x2="516" y2="215" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="420" y="207" fill="#a78bfa" font-size="11" text-anchor="middle">세션 저장</text>

  <line x1="324" y1="245" x2="726" y2="245" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="525" y="237" fill="#f59e0b" font-size="11" text-anchor="middle">인증요청 호출</text>

  <line x1="730" y1="270" x2="106" y2="270" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#arr)"/>
  <text x="418" y="262" fill="#f59e0b" font-size="11" text-anchor="middle">사용자 단말로 푸시</text>

  <!-- Step 3: User approves on external -->
  <line x1="100" y1="310" x2="726" y2="310" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="413" y="302" fill="#10b981" font-size="11" text-anchor="middle">사용자가 외부에서 승인</text>

  <!-- Step 4: sign -->
  <line x1="100" y1="350" x2="316" y2="350" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="208" y="342" fill="#94a3b8" font-size="11" text-anchor="middle">③ sign 호출</text>

  <line x1="324" y1="375" x2="516" y2="375" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="420" y="367" fill="#a78bfa" font-size="11" text-anchor="middle">세션 read</text>

  <line x1="324" y1="405" x2="726" y2="405" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="525" y="397" fill="#38bdf8" font-size="11" text-anchor="middle">sign + 수집 요청</text>

  <!-- Step 5: collect done -->
  <line x1="730" y1="445" x2="324" y2="445" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="525" y="437" fill="#10b981" font-size="11" text-anchor="middle">수집 완료 (Kafka)</text>
  <text x="525" y="463" fill="#475569" font-size="10" text-anchor="middle">primaryAuth = COLLECTED</text>

  <text x="460" y="500" fill="#475569" font-size="11" text-anchor="middle">각 단계가 직전 단계의 세션을 Redis 한 자리에서 꺼내 쓴다</text>
</svg>
