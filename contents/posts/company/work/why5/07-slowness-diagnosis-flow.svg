<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="560" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">느림의 원인 분류 — 진단 흐름</text>
  <text x="460" y="58" fill="#64748b" font-size="12" text-anchor="middle">증상이 같아 보여도 처방은 다르다. 진단부터 정확히.</text>

  <defs>
    <marker id="diagarr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Start -->
  <g transform="translate(360, 90)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#1e293b" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="30" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">"느려요" 신고</text>
  </g>

  <line x1="460" y1="140" x2="460" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#diagarr)"/>

  <!-- Decision 1 -->
  <g transform="translate(310, 175)">
    <rect x="0" y="0" width="300" height="56" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="22" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">두 번째 호출은 빨라지는가?</text>
    <text x="150" y="42" fill="#94a3b8" font-size="11" text-anchor="middle">반복 호출로 패턴 확인</text>
  </g>

  <!-- Yes / No labels -->
  <text x="200" y="265" fill="#10b981" font-size="11" font-weight="600">YES (첫만 느림)</text>
  <text x="700" y="265" fill="#ef4444" font-size="11" font-weight="600">NO (매번 느림)</text>

  <!-- Branches from decision 1 -->
  <line x1="380" y1="231" x2="200" y2="290" stroke="#10b981" stroke-width="2" marker-end="url(#diagarr)"/>
  <line x1="540" y1="231" x2="720" y2="290" stroke="#ef4444" stroke-width="2" marker-end="url(#diagarr)"/>

  <!-- Cold start branch -->
  <g transform="translate(60, 295)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="26" fill="#10b981" font-size="13" font-weight="600" text-anchor="middle">Cold start 의심</text>
    <text x="140" y="48" fill="#94a3b8" font-size="11" text-anchor="middle">JIT / TLS / DNS / IRSA</text>
    <text x="140" y="66" fill="#10b981" font-size="11" font-weight="600" text-anchor="middle">→ Warmup 도입</text>
  </g>

  <!-- Right branch decision: same time vs different patterns -->
  <g transform="translate(580, 295)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="140" y="22" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">단계별 시간 분리</text>
    <text x="140" y="42" fill="#94a3b8" font-size="11" text-anchor="middle">curl -w / backend 로깅</text>
    <text x="140" y="62" fill="#94a3b8" font-size="11" text-anchor="middle">DNS / TCP / TLS / TTFB</text>
  </g>

  <line x1="720" y1="375" x2="720" y2="410" stroke="#94a3b8" stroke-width="2" marker-end="url(#diagarr)"/>

  <!-- Three outcomes for non-cold -->
  <g transform="translate(420, 415)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="90" y="22" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">매번 RST/timeout</text>
    <text x="90" y="40" fill="#94a3b8" font-size="11" text-anchor="middle">Outbound 차단</text>
    <text x="90" y="55" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">→ SRE 컨택</text>
  </g>

  <g transform="translate(630, 415)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="90" y="22" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">매번 비슷한 시간</text>
    <text x="90" y="40" fill="#94a3b8" font-size="11" text-anchor="middle">외부 API 자체 시간</text>
    <text x="90" y="55" fill="#38bdf8" font-size="11" font-weight="600" text-anchor="middle">→ Plan/API 변경</text>
  </g>

  <g transform="translate(420, 490)">
    <rect x="0" y="0" width="390" height="50" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <text x="195" y="22" fill="#ec4899" font-size="12" font-weight="600" text-anchor="middle">burst 시 일부 거절(429)</text>
    <text x="195" y="40" fill="#ec4899" font-size="11" font-weight="600" text-anchor="middle">→ 동시성 직렬화 / commitment tier</text>
  </g>

  <!-- branch lines -->
  <line x1="720" y1="475" x2="510" y2="490" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="720" y1="475" x2="720" y2="490" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 3"/>

</svg>
