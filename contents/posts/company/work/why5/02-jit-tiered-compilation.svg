<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="460" fill="#0f172a"/>

  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">JIT Tiered Compilation — level 0~4</text>
  <text x="460" y="58" fill="#64748b" font-size="12" text-anchor="middle">호출 횟수가 임계치를 넘으면 점진적으로 더 공격적인 최적화 단계로 올라간다</text>

  <defs>
    <marker id="jitarr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Level 0: Interpreter -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="75" y="32" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle">Level 0</text>
    <text x="75" y="56" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Interpreter</text>
    <text x="75" y="78" fill="#64748b" font-size="11" text-anchor="middle">바이트코드 해석</text>
    <text x="75" y="92" fill="#475569" font-size="10" text-anchor="middle">가장 느림</text>
  </g>

  <!-- Level 1: C1 simple -->
  <g transform="translate(220, 130)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="70" y="32" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">Level 1</text>
    <text x="70" y="56" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">C1 (simple)</text>
    <text x="70" y="78" fill="#64748b" font-size="11" text-anchor="middle">프로파일링 X</text>
    <text x="70" y="92" fill="#475569" font-size="10" text-anchor="middle">trivial method</text>
  </g>

  <!-- Level 2: C1 limited -->
  <g transform="translate(390, 130)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="70" y="32" fill="#38bdf8" font-size="12" font-weight="600" text-anchor="middle">Level 2</text>
    <text x="70" y="56" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">C1 (limited)</text>
    <text x="70" y="78" fill="#64748b" font-size="11" text-anchor="middle">제한된 프로파일링</text>
    <text x="70" y="92" fill="#475569" font-size="10" text-anchor="middle">invocation/backedge</text>
  </g>

  <!-- Level 3: C1 full profiling -->
  <g transform="translate(560, 130)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="75" y="32" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Level 3</text>
    <text x="75" y="56" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">C1 (full profile)</text>
    <text x="75" y="78" fill="#64748b" font-size="11" text-anchor="middle">전체 프로파일링</text>
    <text x="75" y="92" fill="#475569" font-size="10" text-anchor="middle">중간 단계</text>
  </g>

  <!-- Level 4: C2 -->
  <g transform="translate(740, 130)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="70" y="32" fill="#10b981" font-size="12" font-weight="600" text-anchor="middle">Level 4</text>
    <text x="70" y="56" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">C2 (server)</text>
    <text x="70" y="78" fill="#64748b" font-size="11" text-anchor="middle">공격적 최적화</text>
    <text x="70" y="92" fill="#475569" font-size="10" text-anchor="middle">peak 성능</text>
  </g>

  <!-- Arrows -->
  <line x1="190" y1="180" x2="216" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#jitarr)"/>
  <line x1="360" y1="180" x2="386" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#jitarr)"/>
  <line x1="530" y1="180" x2="556" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#jitarr)"/>
  <line x1="710" y1="180" x2="736" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#jitarr)"/>

  <!-- Threshold markers -->
  <text x="203" y="252" fill="#64748b" font-size="10" text-anchor="middle">~10회</text>
  <text x="373" y="252" fill="#64748b" font-size="10" text-anchor="middle">~100회</text>
  <text x="543" y="252" fill="#64748b" font-size="10" text-anchor="middle">~1k회</text>
  <text x="723" y="252" fill="#64748b" font-size="10" text-anchor="middle">~15k회</text>

  <!-- Speed bar -->
  <g transform="translate(60, 320)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">속도 (대략):</text>
    <rect x="0" y="14" width="800" height="20" rx="4" fill="url(#jitGradient)"/>
    <defs>
      <linearGradient id="jitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#64748b"/>
        <stop offset="40%" stop-color="#38bdf8"/>
        <stop offset="70%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#10b981"/>
      </linearGradient>
    </defs>
    <text x="0" y="50" fill="#64748b" font-size="10">느림</text>
    <text x="800" y="50" fill="#10b981" font-size="10" text-anchor="end">최고속</text>
  </g>

  <!-- IDEA debug warning -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="800" height="46" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="20" y="22" fill="#f59e0b" font-size="12" font-weight="600">IDEA 디버그 = -XX:TieredStopAtLevel=1</text>
    <text x="20" y="38" fill="#94a3b8" font-size="11">→ C1까지만 가고 C2 끊음. peak 처리량 2~5배 ↓. 운영 측정은 빌드된 jar로.</text>
  </g>
</svg>
