<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="520" fill="#0f172a"/>

  <!-- Title -->
  <text x="460" y="36" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">이벤트 발행부터 랭킹 API까지</text>

  <!-- User -->
  <circle cx="80" cy="140" r="26" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="146" fill="#e2e8f0" font-size="13" text-anchor="middle">User</text>

  <!-- commerce-api (write) -->
  <rect x="160" y="100" width="150" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="235" y="130" fill="#38bdf8" font-size="13" font-weight="600" text-anchor="middle">commerce-api</text>
  <text x="235" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">view / like / order</text>
  <text x="235" y="166" fill="#94a3b8" font-size="11" text-anchor="middle">+ Outbox 저장</text>

  <!-- Kafka -->
  <rect x="370" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="435" y="130" fill="#a78bfa" font-size="13" font-weight="600" text-anchor="middle">Kafka</text>
  <text x="435" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">catalog-events</text>
  <text x="435" y="166" fill="#94a3b8" font-size="11" text-anchor="middle">order-events</text>

  <!-- streamer -->
  <rect x="560" y="100" width="180" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="126" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">commerce-streamer</text>
  <text x="650" y="146" fill="#94a3b8" font-size="11" text-anchor="middle">batch listener (최대 1,500건)</text>
  <text x="650" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">occurredAt → 날짜 키 계산</text>

  <!-- MySQL metrics -->
  <rect x="560" y="240" width="150" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="635" y="266" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">MySQL</text>
  <text x="635" y="284" fill="#94a3b8" font-size="11" text-anchor="middle">product_metrics upsert</text>

  <!-- Redis ZSET -->
  <rect x="740" y="240" width="160" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="820" y="266" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Redis ZSET</text>
  <text x="820" y="284" fill="#94a3b8" font-size="11" text-anchor="middle">ranking:all:{yyyyMMdd}</text>

  <!-- commerce-api (read) -->
  <rect x="310" y="360" width="200" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="410" y="386" fill="#38bdf8" font-size="13" font-weight="600" text-anchor="middle">commerce-api</text>
  <text x="410" y="406" fill="#94a3b8" font-size="11" text-anchor="middle">GET /api/v1/rankings</text>
  <text x="410" y="422" fill="#94a3b8" font-size="11" text-anchor="middle">ZREVRANGE + IN 쿼리 1회</text>

  <!-- User (bottom) -->
  <circle cx="80" cy="400" r="26" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="406" fill="#e2e8f0" font-size="13" text-anchor="middle">User</text>

  <!-- Arrows (top row) -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <line x1="106" y1="140" x2="156" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="310" y1="140" x2="366" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="140" x2="556" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- streamer to MySQL / Redis -->
  <line x1="620" y1="182" x2="620" y2="236" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="182" x2="790" y2="236" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Redis to read API -->
  <path d="M 780 300 Q 780 360 510 400" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Read API to User -->
  <line x1="306" y1="400" x2="110" y2="400" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Labels -->
  <text x="235" y="88" fill="#64748b" font-size="10" text-anchor="middle">1. 행동</text>
  <text x="435" y="88" fill="#64748b" font-size="10" text-anchor="middle">2. 발행</text>
  <text x="650" y="88" fill="#64748b" font-size="10" text-anchor="middle">3. 소비</text>
  <text x="770" y="218" fill="#ef4444" font-size="10" text-anchor="middle">4. ZINCRBY</text>
  <text x="660" y="340" fill="#ef4444" font-size="10" text-anchor="middle">5. 조회</text>
  <text x="200" y="388" fill="#38bdf8" font-size="10" text-anchor="middle">6. 응답</text>

  <!-- Bottom note -->
  <text x="460" y="485" fill="#475569" font-size="11" text-anchor="middle">쓰기 경로와 읽기 경로가 Redis를 사이에 두고 완전히 분리된다</text>
</svg>
