<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="520" rx="12" fill="#ffffff"/>

  <!-- Node 1 -->
  <rect x="110" y="30" width="200" height="48" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="210" y="58" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">👥 1만 명 동시 요청</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="78" x2="210" y2="108" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2 -->
  <rect x="85" y="110" width="250" height="48" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="210" y="138" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">🔒 같은 row에 UPDATE 경합</text>

  <!-- Arrow 2 -->
  <line x1="210" y1="158" x2="210" y2="188" stroke="#4a5568" stroke-width="2"/>

  <!-- Node 3 -->
  <rect x="100" y="190" width="220" height="48" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="210" y="218" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">⏳ row lock 대기 누적</text>

  <!-- Arrow 3 -->
  <line x1="210" y1="238" x2="210" y2="268" stroke="#4a5568" stroke-width="2"/>

  <!-- Node 4 -->
  <rect x="100" y="270" width="220" height="48" rx="8" fill="#533483" filter="url(#shadow)"/>
  <text x="210" y="298" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">💀 DB 커넥션 풀 고갈</text>

  <!-- Arrow 4 - split -->
  <line x1="210" y1="318" x2="210" y2="348" stroke="#4a5568" stroke-width="2"/>

  <!-- Node 5 - Final -->
  <rect x="50" y="360" width="320" height="56" rx="8" fill="#e94560" filter="url(#shadow)"/>
  <text x="210" y="384" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">🔥 상품 조회 · 주문 목록 · 쿠폰 발급</text>
  <text x="210" y="404" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">전체 API 마비</text>

  <!-- Caption -->
  <text x="210" y="460" text-anchor="middle" fill="#6b7280" font-size="11">문제는 쿠폰인데, 죽는 건 서비스 전체</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
