<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arr3" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arr3g" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d6a4f"/>
    </marker>
    <marker id="arr3y" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8860b"/>
    </marker>
  </defs>

  <rect width="700" height="200" rx="12" fill="#0d1117"/>

  <!-- Node 1: DB Transaction -->
  <rect x="15" y="50" width="150" height="60" rx="8" fill="#1a1a2e" filter="url(#shadow3)"/>
  <text x="90" y="74" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">📝 DB 트랜잭션</text>
  <text x="90" y="92" text-anchor="middle" fill="#8b949e" font-size="10">issue_request + outbox</text>

  <line x1="165" y1="80" x2="195" y2="80" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Node 2: Commit -->
  <rect x="200" y="56" width="70" height="48" rx="8" fill="#2d6a4f" filter="url(#shadow3)"/>
  <text x="235" y="84" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">✅ 커밋</text>

  <line x1="270" y1="80" x2="300" y2="80" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Node 3: Scheduler -->
  <rect x="305" y="50" width="130" height="60" rx="8" fill="#16213e" filter="url(#shadow3)"/>
  <text x="370" y="74" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">⏰ Relay Scheduler</text>
  <text x="370" y="92" text-anchor="middle" fill="#8b949e" font-size="10">1초 간격 폴링</text>

  <line x1="435" y1="80" x2="465" y2="80" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Node 4: Kafka send -->
  <rect x="470" y="56" width="100" height="48" rx="8" fill="#0f3460" filter="url(#shadow3)"/>
  <text x="520" y="84" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="600">📤 Kafka send</text>

  <!-- Success branch -->
  <line x1="570" y1="70" x2="610" y2="50" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arr3g)"/>
  <rect x="615" y="30" width="70" height="36" rx="6" fill="#2d6a4f" filter="url(#shadow3)"/>
  <text x="650" y="52" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">PUBLISHED</text>

  <!-- Retry branch -->
  <line x1="570" y1="90" x2="610" y2="110" stroke="#b8860b" stroke-width="2" marker-end="url(#arr3y)"/>
  <rect x="615" y="96" width="70" height="36" rx="6" fill="#b8860b" filter="url(#shadow3)"/>
  <text x="650" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">🔄 재시도</text>

  <!-- Caption -->
  <text x="350" y="165" text-anchor="middle" fill="#6b7280" font-size="11">같은 트랜잭션으로 저장하고, 별도 스케줄러가 릴레이</text>
</svg>
