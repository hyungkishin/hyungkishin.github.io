<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <filter id="shadow3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
    <marker id="arr3" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arr3g" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d6a4f"/>
    </marker>
    <marker id="arr3y" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8860b"/>
    </marker>
  </defs>

  <rect width="780" height="240" rx="12" fill="#ffffff"/>

  <!-- Step 1: DB Transaction -->
  <rect x="15" y="40" width="120" height="55" rx="8" fill="#1a1a2e" filter="url(#shadow3)"/>
  <text x="75" y="62" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">📝 DB 트랜잭션</text>
  <text x="75" y="78" text-anchor="middle" fill="#8b949e" font-size="9">request + outbox</text>

  <line x1="135" y1="67" x2="155" y2="67" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 2: Fetcher -->
  <rect x="160" y="40" width="120" height="55" rx="8" fill="#16213e" filter="url(#shadow3)"/>
  <text x="220" y="60" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">🔍 EventFetcher</text>
  <text x="220" y="76" text-anchor="middle" fill="#8b949e" font-size="9">SELECT + SENDING</text>

  <line x1="280" y1="67" x2="300" y2="67" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 3: Kafka send -->
  <rect x="305" y="40" width="120" height="55" rx="8" fill="#0f3460" filter="url(#shadow3)"/>
  <text x="365" y="60" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">📤 병렬 Kafka send</text>
  <text x="365" y="76" text-anchor="middle" fill="#8b949e" font-size="9">allOf() 대기</text>

  <line x1="425" y1="67" x2="445" y2="67" stroke="#4a5568" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 4: batch UPDATE -->
  <rect x="450" y="40" width="120" height="55" rx="8" fill="#16213e" filter="url(#shadow3)"/>
  <text x="510" y="60" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">📦 batch UPDATE</text>
  <text x="510" y="76" text-anchor="middle" fill="#8b949e" font-size="9">성공/실패/DEAD</text>

  <!-- Results -->
  <line x1="570" y1="55" x2="610" y2="40" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr3g)"/>
  <rect x="615" y="22" width="70" height="32" rx="6" fill="#2d6a4f"/>
  <text x="650" y="42" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">PUBLISHED</text>

  <line x1="570" y1="67" x2="610" y2="67" stroke="#b8860b" stroke-width="1.5" marker-end="url(#arr3y)"/>
  <rect x="615" y="53" width="70" height="32" rx="6" fill="#b8860b"/>
  <text x="650" y="73" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">🔄 FAILED</text>

  <line x1="570" y1="80" x2="610" y2="95" stroke="#e94560" stroke-width="1.5"/>
  <rect x="615" y="84" width="70" height="32" rx="6" fill="#e94560"/>
  <text x="650" y="104" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">💀 DEAD</text>

  <!-- Recovery arrow -->
  <rect x="305" y="140" width="150" height="45" rx="8" fill="#533483" filter="url(#shadow3)"/>
  <text x="380" y="158" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">🔄 SENDING 복구</text>
  <text x="380" y="174" text-anchor="middle" fill="#8b949e" font-size="9">5분 초과 → PENDING</text>

  <path d="M 220 95 Q 220 160, 305 162" fill="none" stroke="#533483" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr3)"/>

  <!-- Caption -->
  <text x="390" y="220" text-anchor="middle" fill="#6b7280" font-size="10">self-invocation 방지를 위해 Fetcher를 별도 빈으로 분리, 트랜잭션 범위를 최소화</text>
</svg>
